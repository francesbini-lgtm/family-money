<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#000000"/>

  <!-- Anello aperto, "C" — gap a destra per ingranaggio (in alto) e plus (in basso) -->
  <path d="M 314 416 A 185 185 0 1 1 314 96" fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round"/>

  <!-- Famiglia: bambina - papà - mamma - bambino, in fila, mani unite (leggero contatto tra le sagome) -->
  <!-- Bambina sinistra -->
  <circle cx="112" cy="266" r="20" fill="#ffffff"/>
  <path d="M 86 350 Q 86 304 112 304 Q 138 304 138 350 Z" fill="#ffffff"/>

  <!-- Papà -->
  <circle cx="200" cy="208" r="30" fill="#ffffff"/>
  <path d="M 146 350 Q 146 264 200 264 Q 254 264 254 350 Z" fill="#ffffff"/>

  <!-- Mamma -->
  <circle cx="312" cy="208" r="30" fill="#ffffff"/>
  <path d="M 258 350 Q 258 264 312 264 Q 366 264 366 350 Z" fill="#ffffff"/>

  <!-- Bambino destro -->
  <circle cx="400" cy="266" r="20" fill="#ffffff"/>
  <path d="M 374 350 Q 374 304 400 304 Q 426 304 426 350 Z" fill="#ffffff"/>

  <!-- Ingranaggio, in alto a destra, sovrapposto all'anello -->
  <g transform="translate(372,116)">
    <circle r="52" fill="#000000" stroke="#ffffff" stroke-width="14"/>
    <circle r="18" fill="#000000" stroke="#ffffff" stroke-width="11"/>
    <g stroke="#ffffff" stroke-width="14" stroke-linecap="round">
      <line x1="0" y1="-66" x2="0" y2="-52"/>
      <line x1="0" y1="52" x2="0" y2="66"/>
      <line x1="-66" y1="0" x2="-52" y2="0"/>
      <line x1="52" y1="0" x2="66" y2="0"/>
      <line x1="-47" y1="-47" x2="-37" y2="-37"/>
      <line x1="37" y1="37" x2="47" y2="47"/>
      <line x1="47" y1="-47" x2="37" y2="-37"/>
      <line x1="-37" y1="37" x2="-47" y2="47"/>
    </g>
  </g>

  <!-- Plus in un cerchio, in basso a destra, sovrapposto all'anello -->
  <g transform="translate(372,396)">
    <circle r="46" fill="#000000" stroke="#ffffff" stroke-width="14"/>
    <g stroke="#ffffff" stroke-width="15" stroke-linecap="round">
      <line x1="0" y1="-24" x2="0" y2="24"/>
      <line x1="-24" y1="0" x2="24" y2="0"/>
    </g>
  </g>
</svg>
