<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#000000"/>

  <!-- Famiglia: due adulti + un bambino, silhouette a linee -->
  <!-- Adulto sinistro -->
  <circle cx="170" cy="185" r="34" fill="none" stroke="#ffffff" stroke-width="16"/>
  <path d="M 108 320 Q 108 235 170 235 Q 232 235 232 320" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>

  <!-- Adulto destro -->
  <circle cx="300" cy="185" r="34" fill="none" stroke="#ffffff" stroke-width="16"/>
  <path d="M 238 320 Q 238 235 300 235 Q 362 235 362 320" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>

  <!-- Bambino al centro, leggermente più in basso e piccolo -->
  <circle cx="235" cy="255" r="22" fill="none" stroke="#ffffff" stroke-width="14"/>
  <path d="M 191 350 Q 191 292 235 292 Q 279 292 279 350" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>

  <!-- Base/linea suolo che unisce la famiglia -->
  <path d="M 100 352 L 372 352" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>

  <!-- Ingranaggio, angolo in basso a destra -->
  <g transform="translate(378,378)">
    <circle r="46" fill="#000000" stroke="#ffffff" stroke-width="12"/>
    <circle r="16" fill="#000000" stroke="#ffffff" stroke-width="10"/>
    <g stroke="#ffffff" stroke-width="12" stroke-linecap="round">
      <line x1="0" y1="-58" x2="0" y2="-46"/>
      <line x1="0" y1="46" x2="0" y2="58"/>
      <line x1="-58" y1="0" x2="-46" y2="0"/>
      <line x1="46" y1="0" x2="58" y2="0"/>
      <line x1="-41" y1="-41" x2="-33" y2="-33"/>
      <line x1="33" y1="33" x2="41" y2="41"/>
      <line x1="41" y1="-41" x2="33" y2="-33"/>
      <line x1="-33" y1="33" x2="-41" y2="41"/>
    </g>
  </g>

  <!-- Plus, angolo in alto a destra -->
  <g transform="translate(388,120)" stroke="#ffffff" stroke-width="14" stroke-linecap="round">
    <line x1="0" y1="-32" x2="0" y2="32"/>
    <line x1="-32" y1="0" x2="32" y2="0"/>
  </g>
</svg>
